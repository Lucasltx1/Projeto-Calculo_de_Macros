<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Macros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Tracker de Macros</h1>

        <!-- Seção: Adicionar Alimento -->
        <div class="card">
            <h2>🍽️ Adicionar Alimento</h2>
            
            <!-- IDs corrigidos para casar com o JS -->
            <input type="text" id="alimento-busca" placeholder="Digite o nome do alimento..." autocomplete="off">
            <input type="hidden" id="alimento-id-selecionado">
            
            <!-- Lista onde as sugestões aparecerão -->
            <ul id="sugestoes-lista"></ul> 
            
            <input type="number" id="quantidade-gramas" placeholder="Quantidade (gramas)">
            <button id="btn-adicionar">Adicionar ao Diário</button>
        </div>

        <!-- Seção: Consumo Hoje -->
<!-- Seção: Consumo Hoje -->
<!-- Seção: Consumo Hoje (CORRETA) -->
<div class="card">
    <h2>Consumo hoje:</h2>
    <ul id="lista-consumo"></ul> <!-- TAG CORRIGIDA -->
    <button id="btn-limpar" style="margin-top: 10px; background-color: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer;">
        Limpar Tudo
    </button>
</div>

        <!-- Seção: Metas -->
        <div class="card">
            <h2>📊 Metas</h2>
            <form id="macro-form">
                <input type="number" id="peso" placeholder="Peso (kg)" required>
                <input type="number" id="altura" placeholder="Altura (cm)" required>
                <input type="number" id="idade" placeholder="Idade" required>
                
                <select id="sexo">
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                </select>

                <select id="atividade">
                    <option value="Sedentário">Sedentário</option>
                    <option value="Leve">Leve</option>
                    <option value="Moderado">Moderado</option>
                    <option value="Muito Ativo">Muito Ativo</option>
                </select>

                <select id="objetivo">
                    <option value="Hipertrofia">Hipertrofia</option>
                    <option value="Secagem">Secagem</option>
                    <option value="Manter">Manter</option>
                </select>

                <button type="submit" style="margin-top: 10px;">Calcular Metas</button>
            </form>
            
            <div id="itens-consumidos" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
